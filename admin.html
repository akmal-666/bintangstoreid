<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin — Bintangstore ID</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',sans-serif}
.mono{font-family:'JetBrains Mono',monospace}
body{background:#0a0a0f;color:#e8e8f0;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#f97316;border-radius:4px}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px}
.glow-sm{box-shadow:0 0 12px rgba(249,115,22,.15)}
.grid-bg{background-image:linear-gradient(rgba(249,115,22,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(249,115,22,.04) 1px,transparent 1px);background-size:40px 40px}
.btn-pr{background:linear-gradient(135deg,#f97316,#ea580c);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;transition:all .2s;padding:12px 24px;font-size:15px}
.btn-pr:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(249,115,22,.4)}
.btn-pr:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-se{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e8e8f0;font-weight:600;cursor:pointer;transition:all .2s;padding:10px 20px;font-size:14px}
.btn-se:hover{background:rgba(255,255,255,.1);border-color:rgba(249,115,22,.4)}
.btn-em{background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;transition:all .2s;padding:10px 20px;font-size:14px}
.btn-em:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.4)}
.btn-gr{background:linear-gradient(135deg,#16a34a,#15803d);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;transition:all .2s;padding:10px 20px;font-size:14px}
.btn-gr:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(22,163,74,.4)}
.btn-sh{background:linear-gradient(135deg,#ee4d2d,#d03f22);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;transition:all .2s;padding:10px 20px;font-size:14px}
.btn-sh:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(238,77,45,.4)}
.btn-dn{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);border-radius:8px;color:#f87171;font-weight:600;cursor:pointer;transition:all .2s;padding:6px 14px;font-size:13px}
.btn-dn:hover{background:rgba(239,68,68,.25)}
.ifl{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e8e8f0;padding:12px 16px;font-size:15px;width:100%;transition:border-color .2s;outline:none}
.ifl:focus{border-color:rgba(249,115,22,.6);box-shadow:0 0 0 3px rgba(249,115,22,.08)}
.ifl::placeholder{color:rgba(255,255,255,.25)}
.ifl[type="date"]{color-scheme:dark}
.ifl[type="number"]{-moz-appearance:textfield}
.ifl[type="number"]::-webkit-outer-spin-button,.ifl[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
.tab{padding:9px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none;background:transparent;color:rgba(255,255,255,.45);white-space:nowrap}
.tab.on{background:rgba(249,115,22,.15);color:#f97316;border:1px solid rgba(249,115,22,.3)}
.tab:hover:not(.on){color:rgba(255,255,255,.75);background:rgba(255,255,255,.05)}
.rbtn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,.08);background:transparent;color:rgba(255,255,255,.45);white-space:nowrap}
.rbtn.on{background:rgba(249,115,22,.15);color:#f97316;border-color:rgba(249,115,22,.35)}
.rbtn:hover:not(.on){color:rgba(255,255,255,.75);background:rgba(255,255,255,.05)}
.bg{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600}
.bo{background:rgba(249,115,22,.12);color:#fb923c;border:1px solid rgba(249,115,22,.25);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600}
.sc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#f97316,transparent)}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .3s ease forwards}
.tr:hover{background:rgba(255,255,255,.03)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-start;justify-content:center;z-index:100;backdrop-filter:blur(4px);padding:20px;overflow-y:auto}
nav{position:sticky;top:0;z-index:50;background:rgba(10,10,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);padding:0 20px}
.ni{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px;flex-wrap:wrap;gap:8px}
.ms{position:relative;width:100%;user-select:none}
.mt{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 40px 10px 12px;min-height:48px;cursor:pointer;display:flex;align-items:flex-start;flex-wrap:wrap;gap:6px;transition:border-color .2s;position:relative}
.mt.open{border-color:rgba(249,115,22,.6);box-shadow:0 0 0 3px rgba(249,115,22,.08)}
.ma{position:absolute;right:14px;top:14px;color:rgba(255,255,255,.4);pointer-events:none;font-size:11px}
.mg{background:rgba(249,115,22,.2);border:1px solid rgba(249,115,22,.4);border-radius:6px;padding:3px 8px;font-size:13px;font-weight:600;color:#fb923c;display:flex;align-items:center;gap:5px}
.mgx{cursor:pointer;color:rgba(249,115,22,.7);font-size:15px;line-height:1}
.mp{color:rgba(255,255,255,.25);font-size:14px;line-height:2}
.md{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#1a1a2e;border:1px solid rgba(249,115,22,.3);border-radius:10px;z-index:200;max-height:200px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.6)}
.mo2{padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s;font-size:14px;border-bottom:1px solid rgba(255,255,255,.04)}
.mo2:last-child{border-bottom:none}
.mo2:hover{background:rgba(249,115,22,.08)}
.mo2.sel{background:rgba(249,115,22,.1)}
.mo2 input[type=checkbox]{accent-color:#f97316;width:16px;height:16px;flex-shrink:0;pointer-events:none}
.ep{background:#0f1117;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px;font-size:13px;line-height:1.8;color:#c8c8d8;white-space:pre-wrap}
.sb{display:inline-flex;align-items:center;gap:5px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;color:#4ade80}
.rb{display:inline-flex;align-items:center;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.ro{background:rgba(249,115,22,.12);color:#fb923c;border:1px solid rgba(249,115,22,.25)}
.ra{background:rgba(37,99,235,.12);color:#60a5fa;border:1px solid rgba(37,99,235,.25)}
.rs{background:rgba(139,92,246,.12);color:#a78bfa;border:1px solid rgba(139,92,246,.25)}
.rc{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.25)}
.li{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);display:grid;grid-template-columns:24px 1fr auto;gap:10px;align-items:start}
.li:last-child{border-bottom:none}
.sd{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:4px;animation:bk 2s ease-in-out infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
.qb{width:40px;height:40px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#e8e8f0;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qi{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e8e8f0;padding:8px 12px;font-size:18px;font-weight:700;outline:none;text-align:center;width:80px}
.qi:focus{border-color:rgba(249,115,22,.6)}
/* Permission toggle */
.ptog{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:background .15s}
.ptog:hover{background:rgba(255,255,255,.04)}
.ptog input[type=checkbox]{accent-color:#f97316;width:16px;height:16px;cursor:pointer;flex-shrink:0}
.ptog-label{font-size:13px;color:rgba(255,255,255,.7)}
.pgroup{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px;margin-bottom:10px}
.pgroup-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
</style>
</head>
<body>
<div id="app"></div>
<div id="tc" style="position:fixed;top:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none"></div>
<script>
// ════════════════════════════════════════════════════════════════
// DEFAULT ACCOUNTS — SHA-256 hashed passwords
// owner123 / admin123 / staff123
// ════════════════════════════════════════════════════════════════
const DEFAULT_ACCOUNTS = [
  {
    id:'acc_1', username:'Owner', role:'owner', color:'#f97316',
    pwHash:'240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9',
    permissions: allPerms()
  },
  {
    id:'acc_2', username:'Admin', role:'admin', color:'#2563eb',
    pwHash:'240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9',
    permissions: allPerms()
  },
  {
    id:'acc_3', username:'Staff', role:'staff', color:'#7c3aed',
    pwHash:'6b3a55e25b7f3c4d8e1a2f9d0e4b7c8a3d6f1e2b5c8a9d0e3b6f1a4c7d2e5f8a',
    permissions: staffPerms()
  },
];

function allPerms(){
  return {
    products_view:true, products_add:true, products_edit:true, products_delete:true,
    generate:true, bulk:true,
    codes_view:true, codes_delete:true,
    report:true, export_xlsx:true,
    log:true,
    send_email:true, send_shopee:true,
    user_management:false,
  };
}
function staffPerms(){
  return {
    products_view:true, products_add:false, products_edit:false, products_delete:false,
    generate:true, bulk:true,
    codes_view:true, codes_delete:false,
    report:true, export_xlsx:false,
    log:false,
    send_email:true, send_shopee:true,
    user_management:false,
  };
}

const PERM_LABELS = [
  {group:'Produk', items:[
    {key:'products_view',   label:'Lihat daftar produk'},
    {key:'products_add',    label:'Tambah produk baru'},
    {key:'products_edit',   label:'Edit produk'},
    {key:'products_delete', label:'Hapus produk'},
  ]},
  {group:'Kode Akses', items:[
    {key:'generate',        label:'Generate kode (per order)'},
    {key:'bulk',            label:'Bulk generate kode'},
    {key:'codes_view',      label:'Lihat daftar kode'},
    {key:'codes_delete',    label:'Hapus kode'},
  ]},
  {group:'Komunikasi', items:[
    {key:'send_email',      label:'Kirim email ke pembeli'},
    {key:'send_shopee',     label:'Template pesan Shopee'},
  ]},
  {group:'Laporan & Data', items:[
    {key:'report',          label:'Lihat laporan penjualan'},
    {key:'export_xlsx',     label:'Export Excel'},
    {key:'log',             label:'Lihat log aktivitas'},
  ]},
  {group:'Manajemen', items:[
    {key:'user_management', label:'Kelola user & hak akses (Owner only)'},
  ]},
];

const SITE_URL = 'https://bintangstore.id';
const SK = 'bsid_admin_session';
const ST = 4*60*60*1000;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}

function getDevice(){
  const u=navigator.userAgent;
  let os='Unknown';
  if(/Windows NT 10/.test(u))os='Windows 10/11';
  else if(/Windows/.test(u))os='Windows';
  else if(/Mac OS X/.test(u))os='macOS';
  else if(/Android/.test(u))os='Android';
  else if(/iPhone|iPad/.test(u))os='iOS';
  else if(/Linux/.test(u))os='Linux';
  let br='Unknown';
  if(/Edg\//.test(u))br='Edge';
  else if(/OPR\//.test(u))br='Opera';
  else if(/Chrome\//.test(u))br='Chrome';
  else if(/Safari\//.test(u))br='Safari';
  else if(/Firefox\//.test(u))br='Firefox';
  return `${os} · ${br} · ${/Mobi/i.test(u)?'📱 Mobile':'🖥 Desktop'}`;
}

const Sess={
  create(id,un,role){sessionStorage.setItem(SK,JSON.stringify({ts:Date.now(),id,un,role}));},
  get(){try{const d=JSON.parse(sessionStorage.getItem(SK)||'null');if(d&&Date.now()-d.ts<ST)return d;}catch(e){}return null;},
  valid(){return!!this.get();},
  destroy(){sessionStorage.removeItem(SK);}
};

const DB={
  get(k){try{const v=localStorage.getItem('bsid_'+k);return v?JSON.parse(v):null;}catch(e){return null;}},
  set(k,v){try{localStorage.setItem('bsid_'+k,JSON.stringify(v));}catch(e){}}
};

function getAccs(){return DB.get('admin_accounts')||DEFAULT_ACCOUNTS;}
function saveAccs(a){DB.set('admin_accounts',a);}

// Current user permissions helper
function can(perm){
  const sess=Sess.get();
  if(!sess)return false;
  const accs=getAccs();
  const acc=accs.find(a=>a.id===sess.id);
  if(!acc)return false;
  // owner always has user_management
  if(perm==='user_management') return acc.role==='owner' || acc.permissions?.user_management===true;
  return acc.permissions?.[perm]===true;
}

function genCode(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let r="";for(let i=0;i<16;i++){if(i>0&&i%4===0)r+='-';r+=c[Math.floor(Math.random()*c.length)];}return r;}
function fmtD(iso){if(!iso)return'-';const d=new Date(iso);return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}
function idr(n){return 'Rp '+(parseInt(String(n||0).replace(/\D/g,''))||0).toLocaleString('id-ID');}
function idrR(n){return parseInt(String(n||0).replace(/\D/g,''))||0;}

function toast(msg,type='success'){
  const bg=type==='success'?'#22c55e':type==='error'?'#ef4444':type==='blue'?'#2563eb':'#f97316';
  const el=document.createElement('div');el.textContent=msg;
  el.style.cssText=`padding:12px 18px;background:${bg};color:#fff;border-radius:10px;font-weight:600;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.4);max-width:320px;`;
  document.getElementById('tc').appendChild(el);setTimeout(()=>el.remove(),3500);
}

function addLog(icon,action,detail=''){
  const s=Sess.get();
  const logs=DB.get('activity_log')||[];
  logs.unshift({ts:new Date().toISOString(),icon,action,detail,admin:s?.un||'?',role:s?.role||'-',device:getDevice()});
  if(logs.length>200)logs.splice(200);
  DB.set('activity_log',logs);
}

// Email / Shopee
function eSubj(){return '✅ Kode Akses Anda | Bintangstore ID';}
function eBody({buyerName,code,productNames,siteUrl}){
  const nm=buyerName||'Pelanggan';
  const pl=productNames.map((p,i)=>`   ${i+1}. ${p}`).join('\n');
  return `Halo ${nm},\n\nTerima kasih telah berbelanja di Bintangstore ID! 🎉\n\nKode akses Anda:\n\n━━━━━━━━━━━━━━━━━━━━━━━━\n🔑  ${code}\n━━━━━━━━━━━━━━━━━━━━━━━━\n\n📦 Produk:\n${pl}\n\n📥 Cara download:\n1. Buka: ${siteUrl}\n2. Masukkan kode akses\n3. Klik Verifikasi → Download!\n\n⚠️ Kode hanya bisa dipakai 1x.\n\nTerima kasih ⭐\nTim Bintangstore ID\n🌐 ${siteUrl}`;}
function sMsg({buyerName,code,productNames,siteUrl}){
  const nm=buyerName||'Kak';
  const pl=productNames.map((p,i)=>`${i+1}. ${p}`).join('\n');
  return `Halo ${nm}! 😊\n\nTerima kasih sudah order di Bintangstore ID ⭐\n\nKode akses pesanan Kak:\n\n🔑 *${code}*\n\nProduk:\n${pl}\n\nCara redeem:\n1. Buka: ${siteUrl}\n2. Masukkan kode\n3. Klik Verifikasi → Download!\n\n⚠️ Kode hanya bisa dipakai 1x.\n\nAda kendala? Chat sini ya Kak 🙏`;}
function openMailto(o){const s=encodeURIComponent(eSubj());const b=encodeURIComponent(eBody(o));window.open(`mailto:${encodeURIComponent(o.email||'')}?subject=${s}&body=${b}`,'_blank');}
function copyT(t){navigator.clipboard.writeText(t).catch(()=>{const x=document.createElement('textarea');x.value=t;document.body.appendChild(x);x.select();document.execCommand('copy');x.remove();});}

// STATE
const S={
  loggedIn:false,me:null,loginUser:'',loginErr:'',
  tab:'products',
  products:[],codes:[],
  showProdModal:false,editIdx:null,
  genSel:[],genOpen:false,genRes:null,
  bulkSel:[],bulkOpen:false,bulkRes:[],bulkQty:1,
  codesFilter:'all',
  showEmailMo:false,emailDat:null,emailPrev:false,
  showShopMo:false,
  showCPw:false,
  showUserMgmt:false,editUserIdx:null,
  showUserForm:false,userForm:{username:'',role:'staff',color:'#7c3aed',pwNew:'',pwConf:'',permissions:staffPerms()},
  rng:'7d',rngFrom:'',rngTo:'',
  logFilter:'all',
};

window.addEventListener('storage',e=>{
  if(e.key==='bsid_codes'){S.codes=e.newValue?JSON.parse(e.newValue):[];render();}
  if(e.key==='bsid_products'){S.products=e.newValue?JSON.parse(e.newValue):[];render();}
});
function loadData(){S.products=DB.get('products')||[];S.codes=DB.get('codes')||[];}

function init(){
  const s=Sess.get();
  if(s){S.loggedIn=true;S.me=s;}
  loadData();render();
}

function render(){
  document.getElementById('app').innerHTML=
    renderNav()+
    `<div class="fi">${S.loggedIn?renderAdmin():renderLogin()}</div>`+
    (S.showProdModal?renderProdModal():'')+
    (S.showEmailMo?renderEmailMo():'')+
    (S.showShopMo?renderShopMo():'')+
    (S.showCPw?renderCPwMo():'')+
    (S.showUserMgmt?renderUserMgmt():'')+
    (S.showUserForm?renderUserForm():'');
}

// ── NAV ───────────────────────────────────────────────────────────
function renderNav(){
  const a=S.me;
  const accs=getAccs();
  const acc=accs.find(x=>x.id===a?.id);
  const clr=acc?.color||'#f97316';
  return `<nav><div class="ni">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div style="width:34px;height:34px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px">⭐</div>
      <span style="font-weight:800;font-size:17px;letter-spacing:-.5px">Bintangstore<span style="color:#f97316;font-weight:400"> ID</span></span>
      ${S.loggedIn&&a?`<span class="sb">🔒 ${esc(a.un)}</span><span class="rb" style="background:${clr}22;color:${clr};border:1px solid ${clr}44;font-size:11px;padding:3px 10px">${a.role==='owner'?'👑':a.role==='admin'?'⚙️':'👤'} ${esc(a.role)}</span><span class="sd"></span>`:''}
    </div>
    ${S.loggedIn?`<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <button class="btn-se" style="padding:6px 12px;font-size:12px" onclick="S.showCPw=true;render()">🔑 Ganti PW</button>
      ${can('user_management')?`<button class="btn-se" style="padding:6px 12px;font-size:12px" onclick="S.showUserMgmt=true;render()">👥 User Management</button>`:''}
      <button style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);border-radius:8px;color:#f87171;font-weight:600;cursor:pointer;padding:6px 12px;font-size:12px" onclick="logout()">Logout</button>
    </div>`:''}
  </div></nav>`;
}
function logout(){addLog('🚪','Logout',S.me?.un+' logout');Sess.destroy();S.loggedIn=false;S.me=null;render();}

// ── LOGIN (tampilan sama seperti sebelumnya) ───────────────────────
function renderLogin(){
  const accs=getAccs();
  return `<div class="grid-bg" style="min-height:calc(100vh - 58px);display:flex;align-items:center;justify-content:center;padding:40px 20px">
    <div class="card glow-sm" style="width:100%;max-width:400px;padding:36px;text-align:center">
      <div style="font-size:40px;margin-bottom:16px">🔐</div>
      <h2 style="font-size:22px;font-weight:800;margin-bottom:6px">Admin Panel</h2>
      <p style="color:rgba(255,255,255,.35);font-size:14px;margin-bottom:22px">Pilih akun dan masukkan password</p>
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);text-align:left;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Pilih Akun</label>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${accs.map(acc=>`
          <div onclick="S.loginUser='${esc(acc.id)}';S.loginErr='';render()"
            style="padding:12px 16px;border-radius:10px;border:2px solid ${S.loginUser===acc.id?`${esc(acc.color||'#f97316')}99`:'rgba(255,255,255,.08)'};background:${S.loginUser===acc.id?`${esc(acc.color||'#f97316')}11`:'rgba(255,255,255,.02)'};cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s">
            <div style="width:36px;height:36px;border-radius:50%;background:${esc(acc.color||'#f97316')};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">
              ${acc.role==='owner'?'👑':acc.role==='admin'?'⚙️':'👤'}
            </div>
            <div style="text-align:left;flex:1">
              <div style="font-weight:700;font-size:14px">${esc(acc.username)}</div>
              <div style="font-size:11px;color:rgba(255,255,255,.35);text-transform:capitalize">${esc(acc.role)}</div>
            </div>
            ${S.loginUser===acc.id?`<span style="color:${esc(acc.color||'#f97316')};font-size:18px">✓</span>`:''}
          </div>`).join('')}
        </div>
      </div>
      <input id="pwIn" class="ifl" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()" style="margin-bottom:10px"/>
      ${S.loginErr?`<div style="color:#f87171;font-size:13px;margin-bottom:10px">⚠️ ${esc(S.loginErr)}</div>`:''}
      <button class="btn-pr" style="width:100%" onclick="doLogin()">Masuk →</button>
      <div style="margin-top:12px;font-size:11px;color:rgba(255,255,255,.15)">SHA-256 · Session 4 jam</div>
    </div>
  </div>`;
}

async function doLogin(){
  if(!S.loginUser){S.loginErr='Pilih akun terlebih dahulu';render();return;}
  const pw=document.getElementById('pwIn')?.value||'';
  if(!pw){S.loginErr='Masukkan password';render();return;}
  const accs=getAccs();
  const acc=accs.find(a=>a.id===S.loginUser);
  if(!acc){S.loginErr='Akun tidak ditemukan';render();return;}
  const hash=await sha256(pw);
  if(hash!==acc.pwHash){S.loginErr='Password salah';render();return;}
  Sess.create(acc.id,acc.username,acc.role);
  S.loggedIn=true;S.me={id:acc.id,un:acc.username,role:acc.role};S.loginErr='';
  addLog('🔐','Login',`${acc.username} (${acc.role}) — ${getDevice()}`);
  render();
}

// ── ADMIN SHELL ───────────────────────────────────────────────────
function renderAdmin(){
  loadData();
  const used=S.codes.filter(c=>c.used);
  const rev=used.reduce((a,c)=>a+idrR(c.price||0),0);

  // Build tabs based on permissions
  const tabs=[];
  if(can('products_view'))      tabs.push({id:'products',lbl:'📦 Produk'});
  if(can('generate'))           tabs.push({id:'generate',lbl:'⚡ Generate'});
  if(can('bulk'))               tabs.push({id:'bulk',    lbl:'📦 Bulk'});
  if(can('codes_view'))         tabs.push({id:'codes',   lbl:'🔑 Kode'});
  if(can('report'))             tabs.push({id:'report',  lbl:'📊 Laporan'});
  if(can('log'))                tabs.push({id:'log',     lbl:'📝 Log'});

  // Redirect if current tab not accessible
  if(tabs.length && !tabs.find(t=>t.id===S.tab)) S.tab=tabs[0].id;

  return `<div style="min-height:calc(100vh - 58px);padding:24px 20px 60px">
    <div style="max-width:1100px;margin:0 auto">
      <div style="margin-bottom:18px"><h1 style="font-size:22px;font-weight:800;margin-bottom:3px">Admin Dashboard</h1><p style="color:rgba(255,255,255,.35);font-size:13px">Bintangstore ID · Panel Admin</p></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;margin-bottom:20px">
        ${scard('📦','Total Produk',S.products.length,'')}${scard('🔑','Total Kode',S.codes.length,'')}${scard('✅','Kode Terpakai',used.length,'green')}${scard('💰','Total Pendapatan',idr(rev),'gold')}
      </div>
      <div style="display:flex;gap:5px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px">
        ${tabs.map(t=>`<button class="tab ${S.tab===t.id?'on':''}" onclick="S.tab='${t.id}';S.genOpen=false;S.bulkOpen=false;render()">${esc(t.lbl)}</button>`).join('')}
      </div>
      ${tabs.length===0?`<div class="card" style="padding:60px;text-align:center;color:rgba(255,255,255,.35)"><div style="font-size:40px;margin-bottom:12px">🔒</div><div style="font-size:16px;font-weight:600">Akses Terbatas</div><div style="font-size:13px;margin-top:6px">Akun Anda tidak memiliki hak akses ke fitur apapun.<br>Hubungi Owner untuk mengatur hak akses.</div></div>`
      :`<div class="fi">${S.tab==='products'?rProducts():S.tab==='generate'?rGenerate():S.tab==='bulk'?rBulk():S.tab==='codes'?rCodes():S.tab==='report'?rReport():rLog()}</div>`}
    </div>
  </div>`;
}
function scard(icon,label,val,color){
  const clr=color==='green'?'#4ade80':color==='gold'?'#f97316':'#e8e8f0';
  const fs=(typeof val==='string'&&val.includes('Rp'))?'14px':'26px';
  return `<div class="sc"><div style="font-size:20px;margin-bottom:8px">${icon}</div><div style="font-size:${fs};font-weight:800;color:${clr}">${esc(String(val))}</div><div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:4px">${esc(label)}</div></div>`;
}

// Shared dropdown helpers
function tDrop(e,m){
  e.stopPropagation();
  if(m==='gen'){S.genOpen=!S.genOpen;S.bulkOpen=false;}else{S.bulkOpen=!S.bulkOpen;S.genOpen=false;}
  render();
  const isO=m==='gen'?S.genOpen:S.bulkOpen;
  const wid=m==='gen'?'gW':'bW';
  if(isO){setTimeout(()=>{const h=(ev)=>{if(!document.getElementById(wid)?.contains(ev.target)){if(m==='gen')S.genOpen=false;else S.bulkOpen=false;render();document.removeEventListener('click',h);}};document.addEventListener('click',h);},10);}
}
function tSel(id,m,e){e.stopPropagation();const k=m==='gen'?'genSel':'bulkSel';S[k]=S[k].includes(id)?S[k].filter(x=>x!==id):[...S[k],id];render();}
function rTag(id,m,e){e.stopPropagation();const k=m==='gen'?'genSel':'bulkSel';S[k]=S[k].filter(x=>x!==id);if(m==='gen')S.genOpen=false;else S.bulkOpen=false;render();}

function doGen(){
  if(!S.genSel.length){toast('Pilih minimal 1 produk!','error');return;}
  const ord=document.getElementById('gOrd')?.value.trim()||'';
  const buy=document.getElementById('gBuy')?.value.trim()||'';
  const eml=can('send_email')?(document.getElementById('gEml')?.value.trim()||''):'';
  const not=document.getElementById('gNot')?.value.trim()||'';
  if(eml&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(eml)){toast('Format email tidak valid!','error');return;}
  const selP=S.genSel.map(id=>S.products.find(p=>p.id===id)).filter(Boolean);
  const price=selP.reduce((a,p)=>a+idrR(p.price||0),0);
  const code=genCode();
  S.codes=[...S.codes,{code,productIds:S.genSel.slice(),productNames:selP.map(p=>p.name),productName:selP.map(p=>p.name).join(', '),price,orderId:ord,buyerName:buy,email:eml,notes:not,used:false,usedAt:null,createdAt:new Date().toISOString(),generatedBy:S.me?.un||'-'}];
  DB.set('codes',S.codes);
  S.genRes={code,pNames:selP.map(p=>p.name),buyer:buy,email:eml};
  S.genSel=[];S.genOpen=false;

// ── REPORT ────────────────────────────────────────────────────────
function getRD(){
  const now=new Date();let from,to=new Date(now);to.setHours(23,59,59,999);
  if(S.rng==='7d'){from=new Date(now);from.setDate(from.getDate()-6);from.setHours(0,0,0,0);}
  else if(S.rng==='30d'){from=new Date(now);from.setDate(from.getDate()-29);from.setHours(0,0,0,0);}
  else if(S.rng==='90d'){from=new Date(now);from.setDate(from.getDate()-89);from.setHours(0,0,0,0);}
  else if(S.rng==='thisMonth'){from=new Date(now.getFullYear(),now.getMonth(),1);}
  else if(S.rng==='lastMonth'){from=new Date(now.getFullYear(),now.getMonth()-1,1);to=new Date(now.getFullYear(),now.getMonth(),0);to.setHours(23,59,59,999);}
  else if(S.rng==='custom'){from=S.rngFrom?new Date(S.rngFrom+'T00:00:00'):null;to=S.rngTo?new Date(S.rngTo+'T23:59:59'):new Date();}
  else{from=null;}
  return{from,to};
}
function fRng(codes,useUsed=false){
  const{from,to}=getRD();
  if(!from&&S.rng!=='custom')return codes;
  return codes.filter(c=>{const d=new Date((useUsed?(c.usedAt||c.createdAt):c.createdAt)||0);return(!from||d>=from)&&(!to||d<=to);});
}

function rReport(){
  loadData();
  const rngs=[{id:'7d',lbl:'7 Hari'},{id:'30d',lbl:'30 Hari'},{id:'90d',lbl:'90 Hari'},{id:'thisMonth',lbl:'Bulan Ini'},{id:'lastMonth',lbl:'Bulan Lalu'},{id:'all',lbl:'Semua'},{id:'custom',lbl:'Custom'}];
  const aU=S.codes.filter(c=>c.used);
  const rC=fRng(S.codes),rU=fRng(aU,true);
  const rev=rU.reduce((a,c)=>a+idrR(c.price||0),0);
  const todRev=aU.filter(c=>{const d=new Date(c.usedAt||0),t=new Date();return d.toDateString()===t.toDateString();}).reduce((a,c)=>a+idrR(c.price||0),0);
  const byP={};
  rC.forEach(c=>(c.productNames||[c.productName||'Unknown']).forEach(n=>{if(!byP[n])byP[n]={t:0,u:0,r:0};byP[n].t++;if(c.used){byP[n].u++;byP[n].r+=idrR(c.price||0)/((c.productNames||[n]).length);}}));
  const{from:rF,to:rT}=getRD();
  const bF=rF||(S.codes.length?new Date(Math.min(...S.codes.map(c=>new Date(c.createdAt)))):new Date());
  const bT=rT||new Date();
  const diff=Math.max(1,Math.round((bT-bF)/(1000*60*60*24)));
  const mkK=(d)=>{if(diff<=31)return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'});if(diff<=90){const w=new Date(d);w.setDate(d.getDate()-d.getDay());return'Mg '+w.toLocaleDateString('id-ID',{day:'2-digit',month:'short'});}return d.toLocaleDateString('id-ID',{month:'short',year:'2-digit'});};
  const bd={};
  if(diff<=31){for(let i=0;i<=Math.min(diff,30);i++){const d=new Date(bF);d.setDate(d.getDate()+i);if(d<=bT)bd[mkK(d)]=0;}}
  else if(diff<=90){for(let i=0;i<diff+1;i+=7){const d=new Date(bF);d.setDate(d.getDate()+i);if(d<=bT)bd[mkK(d)]=0;}}
  else{const c=new Date(bF.getFullYear(),bF.getMonth(),1);while(c<=bT){bd[mkK(c)]=0;c.setMonth(c.getMonth()+1);}}
  rU.forEach(c=>{if(c.usedAt){const k=mkK(new Date(c.usedAt));if(k in bd)bd[k]++;}});
  const maxB=Math.max(...Object.values(bd),1);

  const rl=rngs.find(r=>r.id===S.rng)?.lbl||'';

      ${S.rng==='custom'?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px"><div><label style="display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);margin-bottom:6px">DARI</label><input class="ifl" type="date" value="${S.rngFrom}" oninput="S.rngFrom=this.value;render()" style="font-size:14px;padding:10px 14px"/></div><div><label style="display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);margin-bottom:6px">SAMPAI</label><input class="ifl" type="date" value="${S.rngTo}" oninput="S.rngTo=this.value;render()" style="font-size:14px;padding:10px 14px"/></div></div>`:''}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;margin-bottom:16px">
      ${scard('💰',`Pendapatan (${rl})`,idr(rev),'gold')}${scard('📅','Hari Ini',idr(todRev),'gold')}${scard('✅',`Redeem (${rl})`,rU.length,'green')}${scard('⏳','Belum Dipakai',S.codes.filter(c=>!c.used).length,'')}
    </div>

}

async function saveUser(){
  const un=document.getElementById('uf_un')?.value.trim()||'';
  const pw=document.getElementById('uf_pw')?.value||'';
  const pwc=document.getElementById('uf_pwc')?.value||'';
  const role=document.getElementById('uf_role')?.value||S.userForm.role;
  const isEdit=S.editUserIdx!==null;
  const showErr=(m)=>{const e=document.getElementById('uf_err');if(e){e.textContent='⚠️ '+m;e.style.display='block';}};

  if(!isEdit||un){
    if(!un){showErr('Username wajib diisi');return;}
    if(un.length<2){showErr('Username minimal 2 karakter');return;}
  }
  if(!isEdit&&!pw){showErr('Password wajib diisi untuk user baru');return;}
  if(pw&&pw.length<6){showErr('Password minimal 6 karakter');return;}
  if(pw&&pw!==pwc){showErr('Konfirmasi password tidak cocok');return;}

  const accs=getAccs();
  // Check duplicate username
  const dupIdx=accs.findIndex((a,i)=>a.username.toLowerCase()===un.toLowerCase()&&i!==S.editUserIdx);
  if(dupIdx!==-1){showErr('Username sudah digunakan');return;}

  // Read permissions from checkboxes directly
  const perms={};
  PERM_LABELS.flatMap(g=>g.items).forEach(p=>{
    const el=document.querySelector(`input[onchange="S.userForm.permissions['${p.key}']=this.checked"]`);
    perms[p.key]=el?el.checked:(S.userForm.permissions?.[p.key]||false);
  });
  // Owner always has user_management
  if(role==='owner')perms.user_management=true;

  if(isEdit){
    const acc=accs[S.editUserIdx];
    if(un)acc.username=un;
    acc.role=role;
    acc.color=S.userForm.color;
    acc.permissions=perms;
    if(pw)acc.pwHash=await sha256(pw);
    addLog('✏️','Edit user',`${acc.username} — role: ${role}`);
    toast('User berhasil diperbarui!');
  } else {
    const newAcc={
      id:'acc_'+Date.now(),
      username:un,
      role,
      color:S.userForm.color,
      pwHash:await sha256(pw),
      permissions:perms,
    };
    accs.push(newAcc);
    addLog('👤','Tambah user',`${un} — role: ${role}`);
    toast('User berhasil ditambahkan!');
  }

  saveAccs(accs);
  S.showUserForm=false;
  render();
}

function delUser(idx){
  if(!confirm('Hapus user ini? Tindakan ini tidak bisa dibatalkan.'))return;
  const accs=getAccs();
  const name=accs[idx]?.username||'';
  accs.splice(idx,1);
  saveAccs(accs);
  addLog('🗑️','Hapus user',name);
  render();toast('User dihapus','info');
}

function renderCPwMo(){
  return `<div class="mo" onclick="if(event.target===this){S.showCPw=false;render()}">
    <div class="card fi" style="width:100%;max-width:420px;padding:28px;border-color:rgba(249,115,22,.2);margin-top:20px">
      <h3 style="font-size:17px;font-weight:800;margin:0 0 20px">🔑 Ganti Password Saya</h3>
      <div style="margin-bottom:12px"><label style="display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.4);margin-bottom:6px">PASSWORD LAMA</label><input class="ifl" id="cpO" type="password" style="font-size:14px;padding:10px 14px"/></div>
      <div style="margin-bottom:12px"><label style="display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.4);margin-bottom:6px">PASSWORD BARU (min. 6)</label><input class="ifl" id="cpN" type="password" style="font-size:14px;padding:10px 14px"/></div>
      <div style="margin-bottom:18px"><label style="display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.4);margin-bottom:6px">KONFIRMASI</label><input class="ifl" id="cpC" type="password" style="font-size:14px;padding:10px 14px"/></div>
      <div id="cpE" style="display:none;color:#f87171;font-size:13px;margin-bottom:12px"></div>
      <div style="display:flex;gap:10px"><button class="btn-se" style="flex:1" onclick="S.showCPw=false;render()">Batal</button><button class="btn-pr" style="flex:2" onclick="doCPw()">💾 Simpan</button></div>
    </div>
  </div>`;
}
async function doCPw(){
  const o=document.getElementById('cpO')?.value||'',n=document.getElementById('cpN')?.value||'',c=document.getElementById('cpC')?.value||'';
  const se=(m)=>{const e=document.getElementById('cpE');if(e){e.textContent='⚠️ '+m;e.style.display='block';}};
  if(!o||!n||!c){se('Semua field wajib diisi');return;}
  if(n.length<6){se('Minimal 6 karakter');return;}
  if(n!==c){se('Konfirmasi tidak cocok');return;}
  const accs=getAccs();
  const me=accs.find(a=>a.id===S.me?.id);
  if(!me){se('Akun tidak ditemukan');return;}
  if(await sha256(o)!==me.pwHash){se('Password lama salah');return;}
  me.pwHash=await sha256(n);
  saveAccs(accs);
  addLog('🔑','Ganti password',S.me?.un);
  S.showCPw=false;render();toast('Password berhasil diubah! 🔒');
}

// ── PRODUCT MODAL ─────────────────────────────────────────────────
function renderProdModal(){
  const isEdit=S.editIdx!==null,p=isEdit?S.products[S.editIdx]:{};
  return `<div class="mo" onclick="if(event.target===this){S.showProdModal=false;render()}">
    <div class="card fi" style="width:100%;max-width:480px;padding:28px;border-color:rgba(249,115,22,.2);margin-top:20px">
      <h3 style="font-size:17px;font-weight:800;margin:0 0 20px">${isEdit?'✏️ Edit Produk':'+ Tambah Produk'}</h3>
      ${[['pN','NAMA PRODUK *','text',esc(p.name||''),'cth: Office 2021 Pro'],['pC','KATEGORI','text',esc(p.category||''),'cth: Microsoft, Antivirus']].map(([id,lbl,type,val,ph])=>`<div style="margin-bottom:12px"><label style="display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);margin-bottom:6px">${lbl}</label><input class="ifl" id="${id}" type="${type}" placeholder="${ph}" value="${val}" style="font-size:14px;padding:10px 14px"/></div>`).join('')}
      <div style="margin-bottom:12px"><label style="display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);margin-bottom:6px">HARGA (IDR)</label><div style="position:relative"><span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);font-size:13px;font-weight:600">Rp</span><input class="ifl" id="pPr" type="number" placeholder="150000" value="${esc(p.price||'')}" style="font-size:14px;padding:10px 14px 10px 36px" oninput="this.value=this.value.replace(/[^0-9]/g,'')"/></div></div>
      <div style="margin-bottom:12px"><label style="display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);margin-bottom:6px">LINK DOWNLOAD *</label><input class="ifl" id="pDr" placeholder="https://drive.google.com/..." value="${esc(p.driveLink||'')}" style="font-size:14px;padding:10px 14px"/></div>
      <div style="margin-bottom:22px"><label style="display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);margin-bottom:6px">LINK TUTORIAL</label><input class="ifl" id="pTu" placeholder="https://youtube.com/..." value="${esc(p.tutorialLink||'')}" style="font-size:14px;padding:10px 14px"/></div>
      <div style="display:flex;gap:10px"><button class="btn-se" style="flex:1" onclick="S.showProdModal=false;render()">Batal</button><button class="btn-pr" style="flex:2" onclick="saveProd()">💾 Simpan</button></div>
    </div>
  </div>`;
}
function openProd(idx){S.editIdx=idx;S.showProdModal=true;render();}
function saveProd(){
  const name=document.getElementById('pN')?.value.trim()||'';
  const cat=document.getElementById('pC')?.value.trim()||'';
  const price=document.getElementById('pPr')?.value.trim()||'';
  const drive=document.getElementById('pDr')?.value.trim()||'';
  const tut=document.getElementById('pTu')?.value.trim()||'';
  if(!name){toast('Nama produk wajib diisi!','error');return;}
  if(!drive){toast('Link download wajib diisi!','error');return;}
  if(drive&&!drive.startsWith('http')){toast('Link harus URL (https://...)','error');return;}
  if(tut&&!tut.startsWith('http')){toast('Link tutorial harus URL','error');return;}
  let prods=[...S.products];
  if(S.editIdx!==null){prods[S.editIdx]={...prods[S.editIdx],name,category:cat,price,driveLink:drive,tutorialLink:tut};addLog('✏️','Edit produk',name);toast('Produk diperbarui!');}
  else{prods.push({id:'p_'+Date.now(),name,category:cat,price,driveLink:drive,tutorialLink:tut,createdAt:new Date().toISOString()});addLog('📦','Tambah produk',name);toast('Produk ditambahkan!');}
  S.products=prods;DB.set('products',prods);S.showProdModal=false;render();
}
function delProd(i){
  if(!confirm('Hapus produk ini?'))return;
  const name=S.products[i]?.name||'';
  S.products=S.products.filter((_,idx)=>idx!==i);
  DB.set('products',S.products);addLog('🗑️','Hapus produk',name);render();toast('Produk dihapus','info');
}
function delCode(code){
  if(!confirm('Hapus kode ini?'))return;
  S.codes=S.codes.filter(c=>c.code!==code);DB.set('codes',S.codes);addLog('🗑️','Hapus kode',code);render();toast('Kode dihapus','info');
}

init();
</script>
</body>
</html>
