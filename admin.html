<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin — Bintangstore ID</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',sans-serif}
.mono{font-family:'JetBrains Mono',monospace}
body{background:#0a0a0f;color:#e8e8f0;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#f97316;border-radius:4px}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px}
.glow{box-shadow:0 0 12px rgba(249,115,22,.15)}
.grid-bg{background-image:linear-gradient(rgba(249,115,22,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(249,115,22,.04) 1px,transparent 1px);background-size:40px 40px}
.btn-pr{background:linear-gradient(135deg,#f97316,#ea580c);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;transition:all .2s;padding:12px 24px;font-size:15px}
.btn-pr:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(249,115,22,.4)}
.btn-pr:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-se{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e8e8f0;font-weight:600;cursor:pointer;transition:all .2s;padding:10px 20px;font-size:14px}
.btn-se:hover{background:rgba(255,255,255,.1);border-color:rgba(249,115,22,.4)}
.btn-em{background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;transition:all .2s;padding:10px 20px;font-size:14px}
.btn-em:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.4)}
.btn-gr{background:linear-gradient(135deg,#16a34a,#15803d);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;transition:all .2s;padding:10px 20px;font-size:14px}
.btn-gr:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(22,163,74,.4)}
.btn-sh{background:linear-gradient(135deg,#ee4d2d,#d03f22);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;transition:all .2s;padding:10px 20px;font-size:14px}
.btn-sh:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(238,77,45,.4)}
.btn-dn{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);border-radius:8px;color:#f87171;font-weight:600;cursor:pointer;transition:all .2s;padding:6px 14px;font-size:13px}
.btn-dn:hover{background:rgba(239,68,68,.25)}
.ifl{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e8e8f0;padding:12px 16px;font-size:15px;width:100%;transition:border-color .2s;outline:none}
.ifl:focus{border-color:rgba(249,115,22,.6);box-shadow:0 0 0 3px rgba(249,115,22,.08)}
.ifl::placeholder{color:rgba(255,255,255,.25)}
.ifl[type="date"]{color-scheme:dark}
.ifl[type="number"]{-moz-appearance:textfield}
.ifl[type="number"]::-webkit-outer-spin-button,.ifl[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
.ifl-sel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e8e8f0;padding:12px 16px;font-size:14px;width:100%;transition:border-color .2s;outline:none;cursor:pointer;-webkit-appearance:none}
.ifl-sel:focus{border-color:rgba(249,115,22,.6)}
.ifl-sel option{background:#1a1a2e}
.tab{padding:9px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none;background:transparent;color:rgba(255,255,255,.45);white-space:nowrap}
.tab.on{background:rgba(249,115,22,.15);color:#f97316;border:1px solid rgba(249,115,22,.3)}
.tab:hover:not(.on){color:rgba(255,255,255,.75);background:rgba(255,255,255,.05)}
.rbtn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,.08);background:transparent;color:rgba(255,255,255,.45);white-space:nowrap}
.rbtn.on{background:rgba(249,115,22,.15);color:#f97316;border-color:rgba(249,115,22,.35)}
.rbtn:hover:not(.on){color:rgba(255,255,255,.75);background:rgba(255,255,255,.05)}
.bg{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600}
.bo{background:rgba(249,115,22,.12);color:#fb923c;border:1px solid rgba(249,115,22,.25);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600}
.sc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#f97316,transparent)}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .3s ease forwards}
.tr:hover{background:rgba(255,255,255,.03)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-start;justify-content:center;z-index:100;backdrop-filter:blur(4px);padding:20px;overflow-y:auto}
nav{position:sticky;top:0;z-index:50;background:rgba(10,10,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);padding:0 20px}
.ni{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px;flex-wrap:wrap;gap:8px}
.mswrap{position:relative;width:100%;user-select:none}
.mstrig{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 40px 10px 12px;min-height:48px;cursor:pointer;display:flex;align-items:flex-start;flex-wrap:wrap;gap:6px;transition:border-color .2s;position:relative}
.mstrig.open{border-color:rgba(249,115,22,.6);box-shadow:0 0 0 3px rgba(249,115,22,.08)}
.msarr{position:absolute;right:14px;top:14px;color:rgba(255,255,255,.4);pointer-events:none;font-size:11px}
.mstag{background:rgba(249,115,22,.2);border:1px solid rgba(249,115,22,.4);border-radius:6px;padding:3px 8px;font-size:13px;font-weight:600;color:#fb923c;display:flex;align-items:center;gap:5px}
.mstagx{cursor:pointer;color:rgba(249,115,22,.7);font-size:15px;line-height:1}
.msph{color:rgba(255,255,255,.25);font-size:14px;line-height:2}
.msdrop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#1a1a2e;border:1px solid rgba(249,115,22,.3);border-radius:10px;z-index:200;max-height:260px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.6)}
.mssearch{background:rgba(255,255,255,.05);border:none;border-bottom:1px solid rgba(255,255,255,.08);color:#e8e8f0;padding:10px 14px;font-size:13px;width:100%;outline:none;border-radius:10px 10px 0 0;position:sticky;top:0;z-index:1}
.mssearch::placeholder{color:rgba(255,255,255,.3)}
.msopt{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s;font-size:14px;border-bottom:1px solid rgba(255,255,255,.04)}
.msopt:last-child{border-bottom:none}
.msopt:hover{background:rgba(249,115,22,.08)}
.msopt.sel{background:rgba(249,115,22,.1)}
.msopt input[type=checkbox]{accent-color:#f97316;width:16px;height:16px;flex-shrink:0;pointer-events:none}
.ep{background:#0f1117;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px;font-size:13px;line-height:1.8;color:#c8c8d8;white-space:pre-wrap}
.sb{display:inline-flex;align-items:center;gap:5px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;color:#4ade80}
.rb{display:inline-flex;align-items:center;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.li{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);display:grid;grid-template-columns:24px 1fr auto;gap:10px;align-items:start}
.li:last-child{border-bottom:none}
.sd{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:4px;animation:bk 2s ease-in-out infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
.qb{width:40px;height:40px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#e8e8f0;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qi{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e8e8f0;padding:8px 12px;font-size:18px;font-weight:700;outline:none;text-align:center;width:80px}
.qi:focus{border-color:rgba(249,115,22,.6)}
.ptog{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s}
.ptog:hover{background:rgba(255,255,255,.04)}
.ptog input[type=checkbox]{accent-color:#f97316;width:16px;height:16px;cursor:pointer;flex-shrink:0}
.ptog span{font-size:13px;color:rgba(255,255,255,.7)}
.pgroup{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px;margin-bottom:10px}
.pgtitle{font-size:11px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
</style>
</head>
<body>
<div id="app"></div>
<div id="tc" style="position:fixed;top:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none"></div>
<script>
// ════════════════════════════════════════════════════════════════
// PERMISSION DEFINITIONS
// ════════════════════════════════════════════════════════════════
const PERMS = [
  {group:'Produk',items:[
    {key:'products_view',   lbl:'Lihat daftar produk'},
    {key:'products_add',    lbl:'Tambah produk'},
    {key:'products_edit',   lbl:'Edit produk'},
    {key:'products_delete', lbl:'Hapus produk'},
  ]},
  {group:'Kode Akses',items:[
    {key:'generate',        lbl:'Generate kode (per order)'},
    {key:'bulk',            lbl:'Bulk generate kode'},
    {key:'codes_view',      lbl:'Lihat daftar kode'},
    {key:'codes_delete',    lbl:'Hapus kode'},
  ]},
  {group:'Komunikasi',items:[
    {key:'send_email',      lbl:'Kirim email ke pembeli'},
    {key:'send_shopee',     lbl:'Template pesan Shopee'},
  ]},
  {group:'Laporan & Data',items:[
    {key:'report',          lbl:'Lihat laporan penjualan'},
    {key:'export_xlsx',     lbl:'Export Excel'},
    {key:'log_view',        lbl:'Lihat log aktivitas'},
  ]},
  {group:'Manajemen',items:[
    {key:'user_management', lbl:'Kelola user & hak akses'},
    {key:'role_management', lbl:'Kelola master data role'},
  ]},
];

function allPerms(){
  const p={};
  PERMS.flatMap(g=>g.items).forEach(i=>p[i.key]=true);
  p.user_management=false; p.role_management=false;
  return p;
}
function staffPerms(){
  return {products_view:true,products_add:false,products_edit:false,products_delete:false,generate:true,bulk:true,codes_view:true,codes_delete:false,send_email:true,send_shopee:true,report:false,export_xlsx:false,log_view:false,user_management:false,role_management:false};
}

// DEFAULT ROLES (master data)
const DEFAULT_ROLES = [
  {id:'role_owner',name:'Owner',   color:'#f97316',permissions:{...allPerms(),user_management:true,role_management:true}},
  {id:'role_admin',name:'Admin',   color:'#2563eb',permissions:allPerms()},
  {id:'role_staff',name:'Staff',   color:'#7c3aed',permissions:staffPerms()},
];

// DEFAULT ACCOUNTS
// Passwords: owner123 / admin123 / staff123
const DEFAULT_ACCOUNTS = [
  {id:'acc_1',username:'Owner',role:'Owner',color:'#f97316',pwHash:'43a0d17178a9d26c9e0fe9a74b0b45e38d32f27aed887a008a54bf6e033bf7b9',permissions:{...allPerms(),user_management:true,role_management:true}},
  {id:'acc_2',username:'Admin',role:'Admin',color:'#2563eb',pwHash:'240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9',permissions:allPerms()},
  {id:'acc_3',username:'Staff',role:'Staff',color:'#7c3aed',pwHash:'10176e7b7b24d317acfcf8d2064cfd2f24e154f7b5a96603077d5ef813d6a6b6',permissions:staffPerms()},
];

const SITE_URL='https://bintangstore.id';
const SK='bsid_admin_session';
const ST=4*60*60*1000;

// ── Helpers ───────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}

function getDevice(){
  const u=navigator.userAgent;
  let os='Unknown';
  if(/Windows NT 10/.test(u))os='Win 10/11';else if(/Windows/.test(u))os='Windows';
  else if(/Mac OS X/.test(u))os='macOS';else if(/Android/.test(u))os='Android';
  else if(/iPhone|iPad/.test(u))os='iOS';else if(/Linux/.test(u))os='Linux';
  let br='?';
  if(/Edg\//.test(u))br='Edge';else if(/OPR\//.test(u))br='Opera';
  else if(/Chrome\//.test(u))br='Chrome';else if(/Safari\//.test(u))br='Safari';
  else if(/Firefox\//.test(u))br='Firefox';
  return os+' · '+br+(/Mobi/i.test(u)?' · 📱':' · 🖥');
}

const Sess={
  create(id,un,role){sessionStorage.setItem(SK,JSON.stringify({ts:Date.now(),id,un,role}));},
  get(){try{const d=JSON.parse(sessionStorage.getItem(SK)||'null');if(d&&Date.now()-d.ts<ST)return d;}catch(e){}return null;},
  valid(){return!!this.get();},
  destroy(){sessionStorage.removeItem(SK);}
};

const DB={
  get(k){try{const v=localStorage.getItem('bsid_'+k);return v?JSON.parse(v):null;}catch(e){return null;}},
  set(k,v){try{localStorage.setItem('bsid_'+k,JSON.stringify(v));}catch(e){}}
};

function getRoles(){return DB.get('roles')||DEFAULT_ROLES;}
function saveRoles(r){DB.set('roles',r);}
function getAccs(){return DB.get('admin_accounts')||DEFAULT_ACCOUNTS;}
function saveAccs(a){DB.set('admin_accounts',a);}

function can(perm){
  const s=Sess.get();if(!s)return false;
  const acc=getAccs().find(a=>a.id===s.id);
  if(!acc)return false;
  return acc.permissions?.[perm]===true;
}

function countPerms(p){if(!p)return 0;return Object.values(p).filter(Boolean).length;}

// ── Utils ─────────────────────────────────────────────────────────
function genCode(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let r="";for(let i=0;i<16;i++){if(i>0&&i%4===0)r+='-';r+=c[Math.floor(Math.random()*c.length)];}return r;}
function fmtD(iso){if(!iso)return'-';const d=new Date(iso);return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}
function idr(n){return 'Rp '+(parseInt(String(n||0).replace(/\D/g,''))||0).toLocaleString('id-ID');}
function idrR(n){return parseInt(String(n||0).replace(/\D/g,''))||0;}

function toast(msg,type='success'){
  const bg=type==='success'?'#22c55e':type==='error'?'#ef4444':type==='blue'?'#2563eb':'#f97316';
  const el=document.createElement('div');el.textContent=msg;
  el.style.cssText=`padding:12px 18px;background:${bg};color:#fff;border-radius:10px;font-weight:600;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.4);max-width:320px;`;
  document.getElementById('tc').appendChild(el);setTimeout(()=>el.remove(),3500);
}

function addLog(icon,action,detail=''){
  const s=Sess.get();
  const logs=DB.get('activity_log')||[];
  logs.unshift({ts:new Date().toISOString(),icon,action,detail,admin:s?.un||'?',role:s?.role||'-',device:getDevice()});
  if(logs.length>200)logs.splice(200);
  DB.set('activity_log',logs);
}

// ── Email (Gmail URL — works in browser without email client) ─────
function eSubj(){return '✅ Kode Akses Anda | Bintangstore ID';}
function eBody(o){
  const nm=o.buyerName||'Pelanggan';
  const pl=(o.productNames||[]).map((p,i)=>`   ${i+1}. ${p}`).join('\n');
  return `Halo ${nm},\n\nTerima kasih telah berbelanja di Bintangstore ID! 🎉\n\nKode akses Anda:\n\n━━━━━━━━━━━━━━━━━━━━━━━━\n🔑  ${o.code}\n━━━━━━━━━━━━━━━━━━━━━━━━\n\n📦 Produk:\n${pl}\n\n📥 Cara download:\n1. Buka: ${o.siteUrl||SITE_URL}\n2. Masukkan kode akses\n3. Klik Verifikasi → Download!\n\n⚠️ Kode hanya bisa dipakai 1x.\n\nTerima kasih ⭐\nTim Bintangstore ID\n🌐 ${o.siteUrl||SITE_URL}`;}

// FIX #5: Gmail compose URL (works di browser tanpa default email client)
function openGmail(o){
  const subj=encodeURIComponent(eSubj());
  const body=encodeURIComponent(eBody(o));
  const to=encodeURIComponent(o.email||'');
  // Gmail compose URL — opens directly in Gmail web
  const gmailUrl=`https://mail.google.com/mail/?view=cm&fs=1&to=${to}&su=${subj}&body=${body}`;
  window.open(gmailUrl,'_blank');
}

function sMsg(o){
  const nm=o.buyerName||'Kak';
  const pl=(o.productNames||[]).map((p,i)=>`${i+1}. ${p}`).join('\n');
  return `Halo ${nm}! 😊\n\nTerima kasih sudah order di Bintangstore ID ⭐\n\nKode akses pesanan Kak:\n\n🔑 *${o.code}*\n\nProduk:\n${pl}\n\nCara redeem:\n1. Buka: ${SITE_URL}\n2. Masukkan kode\n3. Klik Verifikasi → Download!\n\n⚠️ Kode hanya bisa dipakai 1x.\n\nAda kendala? Chat sini ya Kak 🙏`;}

function copyT(t){navigator.clipboard.writeText(t).catch(()=>{const x=document.createElement('textarea');x.value=t;document.body.appendChild(x);x.select();document.execCommand('copy');x.remove();});}

// ── STATE ─────────────────────────────────────────────────────────
const S={
  loggedIn:false,me:null,loginErr:'',
  tab:'products',
  products:[],codes:[],
  showProdModal:false,editIdx:null,
  // generate
  genSel:[],genOpen:false,genSearch:'',genRes:null,
  // bulk
  bulkSel:[],bulkOpen:false,bulkSearch:'',bulkRes:[],bulkQty:1,
  // codes
  codesFilter:'all',
  // email modals
  showEmailMo:false,emailDat:null,emailPrev:false,
  // email from codes (force fill)
  showSendEmailMo:false,sendEmailCode:null,sendEmailName:'',sendEmailAddr:'',
  // shopee
  showShopMo:false,shopDat:null,
  // settings
  showCPw:false,
  showUserMgmt:false,editUserIdx:null,showUserForm:false,
  userForm:{username:'',roleId:'',color:'#7c3aed',pwNew:'',pwConf:'',permissions:staffPerms()},
  showRoleMgmt:false,editRoleIdx:null,showRoleForm:false,
  roleForm:{name:'',color:'#7c3aed',permissions:staffPerms()},
  // report
  rng:'7d',rngFrom:'',rngTo:'',
  // log
  logFilter:'all',
};

window.addEventListener('storage',e=>{
  if(e.key==='bsid_codes'){S.codes=e.newValue?JSON.parse(e.newValue):[];render();}
  if(e.key==='bsid_products'){S.products=e.newValue?JSON.parse(e.newValue):[];render();}
});
function loadData(){S.products=DB.get('products')||[];S.codes=DB.get('codes')||[];}

function init(){const s=Sess.get();if(s){S.loggedIn=true;S.me=s;}loadData();render();}

function render(){
  document.getElementById('app').innerHTML=
    renderNav()+
    `<div class="fi">${S.loggedIn?renderAdmin():renderLogin()}</div>`+
    (S.showProdModal?renderProdModal():'')+
    (S.showEmailMo?renderEmailMo():'')+
    (S.showSendEmailMo?renderSendEmailMo():'')+
    (S.showShopMo?renderShopMo():'')+
    (S.showCPw?renderCPwMo():'')+
    (S.showUserMgmt?renderUserMgmt():'')+
    (S.showUserForm?renderUserForm():'')+
    (S.showRoleMgmt?renderRoleMgmt():'')+
    (S.showRoleForm?renderRoleForm():'');
}

// ── NAV ───────────────────────────────────────────────────────────
function renderNav(){
  const a=S.me;
  const acc=getAccs().find(x=>x.id===a?.id);
  const clr=acc?.color||'#f97316';
  return `<nav><div class="ni">

async function doLogin(){
  const un=(document.getElementById('lun')?.value||'').trim();
  const pw=document.getElementById('lpw')?.value||'';
  if(!un){S.loginErr='Masukkan username';render();return;}
  if(!pw){S.loginErr='Masukkan password';render();return;}
  const accs=getAccs();
  // Case-insensitive username match
  const acc=accs.find(a=>a.username.toLowerCase()===un.toLowerCase());
  if(!acc){S.loginErr='Username tidak ditemukan';render();return;}
  const hash=await sha256(pw);
  if(hash!==acc.pwHash){S.loginErr='Password salah';render();return;}
  Sess.create(acc.id,acc.username,acc.role);
  S.loggedIn=true;S.me={id:acc.id,un:acc.username,role:acc.role};S.loginErr='';
  addLog('🔐','Login',`${acc.username} (${acc.role}) — ${getDevice()}`);
  render();
}

function renderMsDrop(id, selArr, openFlag, searchVal, mode){
  const filtered = S.products.filter(p =>

  return `<div class="mswrap" id="${id}">

          `<span class="mstag">${esc(p.name)}<span class="mstagx" onclick="rTag('${esc(p.id)}','${mode}',event)">×</span></span>`
        ).join('')}
      <span class="msarr">${openFlag?'▲':'▼'}</span>
    </div>
    ${openFlag?`<div class="msdrop">
      <input class="mssearch" placeholder="🔍 Cari produk..." value="${esc(searchVal)}"
        oninput="if('${mode}'==='gen'){S.genSearch=this.value;}else{S.bulkSearch=this.value;}renderDropOnly('${id}','${mode}')"
        onclick="event.stopPropagation()" id="mssearch_${mode}"/>
      ${filtered.length===0?`<div style="padding:14px;color:rgba(255,255,255,.3);font-size:13px;text-align:center">Tidak ada produk ditemukan</div>`:
        filtered.map(p=>`<div class="msopt ${selArr.includes(p.id)?'sel':''}" onclick="tSel('${esc(p.id)}','${mode}',event)">
          <input type="checkbox" ${selArr.includes(p.id)?'checked':''} onclick="event.stopPropagation()"/>
          <div style="flex:1"><div style="font-weight:600">${esc(p.name)}</div>${p.price?`<div style="font-size:11px;color:rgba(255,255,255,.35)">${idr(p.price)}</div>`:''}</div>
          ${selArr.includes(p.id)?`<span style="color:#f97316">✓</span>`:''}
        </div>`).join('')}
    </div>`:''}
  </div>`;
}

function renderDropOnly(wrapId, mode){
  // Re-render only the dropdown content without full re-render (preserves search input focus)
  const sel = mode==='gen'?S.genSel:S.bulkSel;
  const search = mode==='gen'?S.genSearch:S.bulkSearch;
  const filtered = S.products.filter(p => !search||p.name.toLowerCase().includes(search.toLowerCase()));
  const drop = document.querySelector(`#${wrapId} .msdrop`);
  if(!drop)return;
  const searchEl = drop.querySelector('.mssearch');
  const optHtml = filtered.length===0
    ?`<div style="padding:14px;color:rgba(255,255,255,.3);font-size:13px;text-align:center">Tidak ada produk</div>`
    :filtered.map(p=>`<div class="msopt ${sel.includes(p.id)?'sel':''}" onclick="tSel('${esc(p.id)}','${mode}',event)">
      <input type="checkbox" ${sel.includes(p.id)?'checked':''} onclick="event.stopPropagation()"/>
      <div style="flex:1"><div style="font-weight:600">${esc(p.name)}</div>${p.price?`<div style="font-size:11px;color:rgba(255,255,255,.35)">${idr(p.price)}</div>`:''}</div>
      ${sel.includes(p.id)?`<span style="color:#f97316">✓</span>`:''}
    </div>`).join('');
  // Remove old opts, keep search input
  Array.from(drop.children).filter(el=>!el.classList.contains('mssearch')).forEach(el=>el.remove());
  drop.insertAdjacentHTML('beforeend', optHtml);
}

function tDrop(e,mode){
  e.stopPropagation();
  if(mode==='gen'){S.genOpen=!S.genOpen;S.bulkOpen=false;}
  else{S.bulkOpen=!S.bulkOpen;S.genOpen=false;}
  render();
  const isO=mode==='gen'?S.genOpen:S.bulkOpen;
  const wid=mode==='gen'?'genWrap':'bulkWrap';
  if(isO){
    setTimeout(()=>{
      document.getElementById('mssearch_'+mode)?.focus();
      const h=(ev)=>{if(!document.getElementById(wid)?.contains(ev.target)){if(mode==='gen'){S.genOpen=false;S.genSearch='';}else{S.bulkOpen=false;S.bulkSearch='';}render();document.removeEventListener('click',h);}};
      document.addEventListener('click',h);
    },50);
  }
}
function tSel(id,mode,e){
  e.stopPropagation();
  const k=mode==='gen'?'genSel':'bulkSel';
  S[k]=S[k].includes(id)?S[k].filter(x=>x!==id):[...S[k],id];
  // Re-render options without losing search focus
  const search=mode==='gen'?S.genSearch:S.bulkSearch;
  renderDropOnly(mode==='gen'?'genWrap':'bulkWrap',mode);
}
function rTag(id,mode,e){
  e.stopPropagation();
  const k=mode==='gen'?'genSel':'bulkSel';
  S[k]=S[k].filter(x=>x!==id);
  if(mode==='gen'){S.genOpen=false;S.genSearch='';}else{S.bulkOpen=false;S.bulkSearch='';}
  render();
}

function doGen(){
  if(!S.genSel.length){toast('Pilih minimal 1 produk!','error');return;}
  const ord=document.getElementById('gOrd')?.value.trim()||'';
  const buy=document.getElementById('gBuy')?.value.trim()||'';
  const eml=can('send_email')?(document.getElementById('gEml')?.value.trim()||''):'';
  const not=document.getElementById('gNot')?.value.trim()||'';
  if(eml&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(eml)){toast('Format email tidak valid!','error');return;}
  const selP=S.genSel.map(id=>S.products.find(p=>p.id===id)).filter(Boolean);
  const price=selP.reduce((a,p)=>a+idrR(p.price||0),0);
  const code=genCode();
  S.codes=[...S.codes,{code,productIds:S.genSel.slice(),productNames:selP.map(p=>p.name),productName:selP.map(p=>p.name).join(', '),price,orderId:ord,buyerName:buy,email:eml,notes:not,used:false,usedAt:null,createdAt:new Date().toISOString(),generatedBy:S.me?.un||'-'}];
  DB.set('codes',S.codes);
  S.genRes={code,pNames:selP.map(p=>p.name),buyer:buy,email:eml};
  S.genSel=[];S.genOpen=false;S.genSearch='';
  addLog('⚡','Generate kode',`${code} — ${selP.map(p=>p.name).join(', ')}${buy?' — '+buy:''}`);
  render();toast('Kode berhasil digenerate! 🎉');
}

function doBulk(){
  if(!S.bulkSel.length){toast('Pilih minimal 1 produk!','error');return;}
  const not=document.getElementById('bNot')?.value.trim()||'';
  const qty=Math.max(1,Math.min(50,parseInt(S.bulkQty)||1));
  const selP=S.bulkSel.map(id=>S.products.find(p=>p.id===id)).filter(Boolean);
  const price=selP.reduce((a,p)=>a+idrR(p.price||0),0);
  const entries=[],results=[];
  for(let i=0;i<qty;i++){
    const code=genCode();
    entries.push({code,productIds:S.bulkSel.slice(),productNames:selP.map(p=>p.name),productName:selP.map(p=>p.name).join(', '),price,orderId:'',buyerName:'',email:'',notes:not,used:false,usedAt:null,createdAt:new Date().toISOString(),generatedBy:S.me?.un||'-',isBulk:true});
    results.push({code,productNames:selP.map(p=>p.name)});
  }
  S.codes=[...S.codes,...entries];DB.set('codes',S.codes);
  S.bulkRes=results;S.bulkSel=[];S.bulkOpen=false;S.bulkSearch='';
  addLog('📦','Bulk generate',`${qty} kode — ${selP.map(p=>p.name).join(', ')}`);
  render();toast(`${qty} kode berhasil digenerate! 📦`);
}

function expXLSX(){
  loadData();if(!S.codes.length){toast('Tidak ada data','info');return;}

  const used=S.codes.filter(c=>c.used);const rev=used.reduce((a,c)=>a+idrR(c.price||0),0);

  const sum=Object.entries(byP).map(([n,d])=>({'Produk':n,'Total':d.t,'Terpakai':d.u,'Belum':d.t-d.u,'Est. Pendapatan (Rp)':Math.round(d.r),'Konversi (%)':d.t?Math.round(d.u/d.t*100):0}));
  const tK=Object.values(byP).reduce((a,d)=>a+d.t,0),tU=Object.values(byP).reduce((a,d)=>a+d.u,0);
  sum.push({'Produk':'── TOTAL ──','Total':tK,'Terpakai':tU,'Belum':tK-tU,'Est. Pendapatan (Rp)':Math.round(Object.values(byP).reduce((a,d)=>a+d.r,0)),'Konversi (%)':tK?Math.round(tU/tK*100):0});

function getRD(){
  const now=new Date();let from,to=new Date(now);to.setHours(23,59,59,999);
  if(S.rng==='7d'){from=new Date(now);from.setDate(from.getDate()-6);from.setHours(0,0,0,0);}
  else if(S.rng==='30d'){from=new Date(now);from.setDate(from.getDate()-29);from.setHours(0,0,0,0);}
  else if(S.rng==='90d'){from=new Date(now);from.setDate(from.getDate()-89);from.setHours(0,0,0,0);}
  else if(S.rng==='thisMonth'){from=new Date(now.getFullYear(),now.getMonth(),1);}
  else if(S.rng==='lastMonth'){from=new Date(now.getFullYear(),now.getMonth()-1,1);to=new Date(now.getFullYear(),now.getMonth(),0);to.setHours(23,59,59,999);}
  else if(S.rng==='custom'){from=S.rngFrom?new Date(S.rngFrom+'T00:00:00'):null;to=S.rngTo?new Date(S.rngTo+'T23:59:59'):new Date();}
  else{from=null;}
  return{from,to};
}
function fRng(codes,useUsed=false){
  const{from,to}=getRD();if(!from&&S.rng!=='custom')return codes;
  return codes.filter(c=>{const d=new Date((useUsed?(c.usedAt||c.createdAt):c.createdAt)||0);return(!from||d>=from)&&(!to||d<=to);});
}

  const byP={};rC.forEach(c=>(c.productNames||[c.productName||'?']).forEach(n=>{if(!byP[n])byP[n]={t:0,u:0,r:0};byP[n].t++;if(c.used){byP[n].u++;byP[n].r+=idrR(c.price||0)/((c.productNames||[n]).length);}}));
  const{from:rF,to:rT}=getRD();const bF=rF||(S.codes.length?new Date(Math.min(...S.codes.map(c=>new Date(c.createdAt)))):new Date());const bT=rT||new Date();
  const diff=Math.max(1,Math.round((bT-bF)/(1000*60*60*24)));

  const bd={};

async function saveUser(){
  const un=document.getElementById('uf_un')?.value.trim()||'';
  const pw=document.getElementById('uf_pw')?.value||'';
  const pwc=document.getElementById('uf_pwc')?.value||'';
  const roleId=document.getElementById('uf_role')?.value||S.userForm.roleId;
  const isEdit=S.editUserIdx!==null;
  const se=(m)=>{const e=document.getElementById('uf_err');if(e){e.textContent='⚠️ '+m;e.style.display='block';}};
  if(!un){se('Username wajib diisi');return;}
  if(un.length<2){se('Username minimal 2 karakter');return;}
  if(!isEdit&&!pw){se('Password wajib diisi untuk user baru');return;}
  if(pw&&pw.length<6){se('Password minimal 6 karakter');return;}
  if(pw&&pw!==pwc){se('Konfirmasi password tidak cocok');return;}
  const accs=getAccs();
  const dup=accs.findIndex((a,i)=>a.username.toLowerCase()===un.toLowerCase()&&i!==S.editUserIdx);
  if(dup!==-1){se('Username sudah digunakan');return;}
  const roles=getRoles();
  const selRole=roles.find(r=>r.id===roleId);
  // Read permissions from checkboxes
  const perms={};
  PERMS.flatMap(g=>g.items).forEach(p=>{
    const el=document.querySelector(`#uf_err`)?.closest('.card, .mo > div')?.querySelector(`input[onchange="S.userForm.permissions['${p.key}']=this.checked"]`);
    const allEls=document.querySelectorAll(`input[onchange="S.userForm.permissions['${p.key}']=this.checked"]`);
    const lastEl=allEls[allEls.length-1];
    perms[p.key]=lastEl?lastEl.checked:(S.userForm.permissions?.[p.key]||false);
  });
  if(isEdit){
    const acc=accs[S.editUserIdx];
    acc.username=un;acc.role=selRole?.name||'Custom';acc.color=S.userForm.color;acc.permissions=perms;
    if(pw)acc.pwHash=await sha256(pw);
    addLog('✏️','Edit user',`${un} — role: ${acc.role}`);toast('User diperbarui!');
  } else {
    accs.push({id:'acc_'+Date.now(),username:un,role:selRole?.name||'Custom',color:S.userForm.color,pwHash:await sha256(pw),permissions:perms});
    addLog('👤','Tambah user',`${un} — role: ${selRole?.name||'Custom'}`);toast('User ditambahkan!');
  }
  saveAccs(accs);S.showUserForm=false;render();
}

function delUser(idx){
  if(!confirm('Hapus user ini?'))return;
  const accs=getAccs();const name=accs[idx]?.username||'';
  accs.splice(idx,1);saveAccs(accs);
  addLog('🗑️','Hapus user',name);render();toast('User dihapus','info');
}

  const tut=document.getElementById('pTu')?.value.trim()||'';
  if(!name){toast('Nama produk wajib diisi!','error');return;}
  if(!drive){toast('Link download wajib diisi!','error');return;}
  if(drive&&!drive.startsWith('http')){toast('Link harus URL (https://...)','error');return;}
  if(tut&&!tut.startsWith('http')){toast('Link tutorial harus URL','error');return;}
  let prods=[...S.products];
  if(S.editIdx!==null){prods[S.editIdx]={...prods[S.editIdx],name,category:cat,price,driveLink:drive,tutorialLink:tut};addLog('✏️','Edit produk',name);toast('Produk diperbarui!');}
  else{prods.push({id:'p_'+Date.now(),name,category:cat,price,driveLink:drive,tutorialLink:tut,createdAt:new Date().toISOString()});addLog('📦','Tambah produk',name);toast('Produk ditambahkan!');}
  S.products=prods;DB.set('products',prods);S.showProdModal=false;render();
}
function delProd(i){
  if(!confirm('Hapus produk ini?'))return;
  const name=S.products[i]?.name||'';
  S.products=S.products.filter((_,idx)=>idx!==i);DB.set('products',S.products);addLog('🗑️','Hapus produk',name);render();toast('Produk dihapus','info');
}
function delCode(code){
  if(!confirm('Hapus kode ini?'))return;
  S.codes=S.codes.filter(c=>c.code!==code);DB.set('codes',S.codes);addLog('🗑️','Hapus kode',code);render();toast('Kode dihapus','info');
}

init();
</script>
</body>
</html>
